<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Games</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <span id="heading"><h1><pre>Rock  Paper  Scissor </pre></h1></span>

    <div id="optionBox">
        <div id="rock"  class="choises"><img src="Rock.png" alt=""></div>
        <div id="paper" class="choises"><img src="Paper.png" alt="" srcset=""></div>
        <div id="scissors" class="choises" >
            <img src="Scissors .png" alt="" srcset="">
        </div>
    </div>
    <div id="scoreBoard">
        <div class="score">
            <p id="user-score">0</p>
            <p id="name">You</p>
        </div>
        <div class="score">
            <p id="computer-score">0</p>
            <p>Robot</p>
        </div>
    </div>
    <div class="messageCont">
        <p id="message">
            Play your move
        </p>
    </div>
    <div id="selection">
        <p id="userSel">Select Option</p>
        <p id="compSel">Select Option</p>
    </div>
    <script src="App.JS"></script>
</body>
</html>
